<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - JC Service</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ✅ HEADER COMMUN -->
<div id="header"></div>

<section class="contact-section">

<div class="contact-container">

<h2>Demande de devis</h2>
<p>Remplissez ce formulaire, nous vous recontactons rapidement.</p>

<form action="https://formsubmit.co/instal.jcservice@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://jcservice67.github.io/jc-service/merci.html">

<div class="form-group">
<input type="text" name="Nom" placeholder="Nom / Prénom" required>
</div>

<div class="form-group">
<input type="tel" name="Téléphone" placeholder="Téléphone" required>
</div>

<div class="form-group">
<input type="email" name="Email" placeholder="Email" required>
</div>

<div class="form-group">
<select name="Service" required>
<option value="">Type de demande</option>
<option>Installation</option>
<option>Entretien</option>
<option>Dépannage</option>
</select>
</div>

<div class="form-group">
<textarea name="Message" placeholder="Décrivez votre besoin..." rows="5" required></textarea>
</div>

<button type="submit" class="btn">Envoyer la demande</button>

</form>

</div>

</section>

<a href="contact.html" class="floating-devis">
Demander un devis
</a>

<!-- ✅ SCRIPT HEADER -->
<script>
fetch("header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;

    const links = document.querySelectorAll("nav a");
    links.forEach(link => {
      if (link.href === window.location.href) {
        link.classList.add("active");
      }
    });
  });
</script>

</body>
</html>
