<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - JC Service</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- HERO -->
<section class="hero-contact">
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1>Un projet ? Contactez-nous</h1>
    <p>Appelez-nous au <strong>06 85 30 69 73</strong> ou envoyez-nous un message.</p>
  </div>
</section>

<!-- IMAGE HERO -->
<section class="hero-image-section">
  <img src="hero-energie.png" alt="Energie">
</section>

<!-- FORMULAIRE -->
<section class="contact-section">
  <div class="contact-container">

    <h2>Demande de contact</h2>

    <form action="https://formsubmit.co/instal.jcservice@gmail.com" method="POST">

      <!-- CONFIG FORMSUBMIT -->
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="Nouveau message - JC Service">
      <input type="hidden" name="_template" value="table">

      <div class="form-group">
        <input type="text" name="Nom" placeholder="Votre nom" required>
      </div>

      <div class="form-group">
        <input type="email" name="Email" placeholder="Votre email" required>
      </div>

      <div class="form-group">
        <input type="tel" name="Téléphone" placeholder="Votre téléphone">
      </div>

      <div class="form-group">
        <textarea name="Message" placeholder="Votre message..." required></textarea>
      </div>

      <button type="submit" class="btn-primary">Envoyer la demande</button>

    </form>

  </div>
</section>

<!-- BANDEAU BAS -->
<section class="cta-bottom">
  <div class="cta-content">
    <h2>Un projet ? Parlons-en</h2>
    <p>Installation, rénovation ou dépannage — on vous accompagne de A à Z.</p>
    <a href="contact.html" class="btn-primary">Demander un devis</a>
  </div>
</section>

<!-- SCRIPT HEADER -->
<script>
fetch("header.html")
  .then(response => response.text())
  .then(data => document.getElementById("header").innerHTML = data);
</script>

</body>
</html>
